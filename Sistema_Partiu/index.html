<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - Partiu!</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="login-wrapper">
      <section class="login-card">
        <header class="login-header">
          <h1>Sistema <span class="brand-highlight">Partiu!</span></h1>
          <p>Digite seu nome e sua idade para entrar</p>
        </header>
        
        <form class="login-form">
          <div class="linha-form">
            <label for="nome">Nome</label>
            <input type="text" id="nome" name="nome" placeholder="Digite seu nome" required autocomplete="off" />
          </div>

          <div class="linha-form">
            <label for="idade">Idade</label>
            <input type="number" id="idade" name="idade" min="1" max="120" placeholder="Ex: 18" required />

          </div>
          <button onclick="onLogin(event)"class="btn-submit">Entrar</button> 
        </form>
      </section>
    </main>
    <script src="login.js"></script> <!-- geralmente script no final do body para carregar o html primeiro. -->
  </body>
</html>
